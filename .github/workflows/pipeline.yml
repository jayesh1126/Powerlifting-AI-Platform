name: CI/CD Production Pipeline

on:
  push:
    branches: [main] # Triggers only on direct pushes or merged PRs into main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/jayesh1126/powerlifting-ai

jobs:
  web-checks:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env: # placeholders — this build only proves compilability, it isn't deployed
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder

  orchestrator-checks:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: orchestrator } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m compileall -q app
      - run: python -c "from app.main import app" # import smoke test — catches wiring errors
        env: { INTERNAL_API_KEY: ci-only-dummy } # settings require it to exist

  build-and-push:
    needs: [web-checks, orchestrator-checks] # the gate: broken code never builds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # PRs stop at checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # lets GITHUB_TOKEN push to GHCR
    strategy:
      matrix:
        service: [web, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # free, auto-scoped, no PAT
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    concurrency: production # two pushes in quick succession queue, never overlap
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/Powerlifting-AI-Platform
            git fetch origin main
            git reset --hard ${{ github.sha }}
            cd infra
            grep -q '^IMAGE_TAG=' .env \
              && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/" .env \
              || echo "IMAGE_TAG=${{ github.sha }}" >> .env
            docker compose pull web orchestrator
            docker compose up -d
            sleep 10
            curl -fsS https://powerlifting-ai.com/ > /dev/null
            docker compose exec -T orchestrator python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"
            echo "deployed ${{ github.sha }}"

  prune-old-images:
    needs: deploy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [web, orchestrator]
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: powerlifting-ai-${{ matrix.service }}
          package-type: container
          min-versions-to-keep: 4 # enough history to roll back a few deploys
          token: ${{ secrets.GH_PACKAGE_DELETE_TOKEN }}
