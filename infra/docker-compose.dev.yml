# Dev-only overlay: publishes the OPL database on loopback so an
# orchestrator running on the host (uvicorn --reload) can reach it.
# Never use on the VPS — the base compose keeps the DB unpublished.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d opl-db
#
# Matches OPL_DATABASE_URL=postgresql://opl:...@localhost:5433/openpowerlifting
# in orchestrator/.env.

services:
  opl-db:
    ports:
      - "127.0.0.1:5433:5432"

  # Docker Desktop's VM root is a private mount, so rslave propagation
  # (correct on the Linux VPS) is rejected locally. !override replaces
  # the base volumes list rather than concatenating with it.
  node-exporter:
    volumes: !override
      - /:/host:ro

  # Publish Prometheus on loopback so you can open the UI + Targets page
  # at http://localhost:9090 while developing. Same loopback pattern as
  # opl-db above; never published in prod (base file has no ports).
  prometheus:
    ports:
      - "127.0.0.1:9090:9090"
  
  grafana:
    ports:
      - "127.0.0.1:3001:3000"
