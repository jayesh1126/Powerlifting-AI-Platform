# What Prometheus scrapes and how often. Service names resolve via
# docker's internal DNS on app_net — nothing here is reachable from
# outside the compose network.

global:
  scrape_interval: 15s # default for every job below
  evaluation_interval: 15s # how often alert/recording rules are evaluated (none yet)

scrape_configs:
  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:8000"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:2020"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
